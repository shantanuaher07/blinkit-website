<!DOCTYPE html>
<html>
<head>
<title>Checkout Page</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.container{
width:400px;
margin:auto;
margin-top:50px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px gray;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid gray;
}

button{
background:#0c831f;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#096b18;
}

</style>
</head>

<body>

<div class="container">

<h2>Checkout</h2>

<form onsubmit="placeOrder(event)">

<label>Name</label>
<input type="text" required>

<label>Phone</label>
<input type="tel" required>

<label>Address</label>
<input type="text" required>

<label>City</label>
<input type="text" required>

<label>Payment Method</label>

<select>
<option>Cash on Delivery</option>
<option>UPI</option>
<option>Credit Card</option>
<option>Debit Card</option>
</select>

<button type="submit">Place Order</button>

</form>

</div>

<script>

function placeOrder(event){
event.preventDefault();
alert("Order Placed Successfully!");
window.location.href="index.html";
}

</script>

</body>
</html>
