<!DOCTYPE html>

<title>Blinkit Clone</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

/* Navbar */

nav{
background:#0f8a2b;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
color:white;
font-size:24px;
}

#searchBox{
width:40%;
padding:8px;
border-radius:5px;
border:none;
}

nav button{
padding:8px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* Banner */

.banner{
text-align:center;
padding:40px;
background:#cde6d2;
font-size:28px;
}

/* Category */

.category{
padding:20px;
font-size:22px;
font-weight:bold;
}

/* Products */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:80px;
}

.card button{
background:#0f8a2b;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

function searchProduct(){

let input=document.getElementById("searchBox").value.toLowerCase();

let cards=document.getElementsByClassName("product");

for(let i=0;i<cards.length;i++){

let name=cards[i].getElementsByTagName("h3")[0].innerText.toLowerCase();
