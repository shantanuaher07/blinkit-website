<!DOCTYPE html>
<html>
<head>

<title>Your Cart</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

nav{
background:#0f8a2b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:white;
font-size:22px;
}

button{
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.cart-title{
text-align:center;
margin-top:20px;
}

.cart-list{
background:white;
width:60%;
margin:auto;
padding:20px;
border-radius:10px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.qty-box{
display:flex;
align-items:center;
gap:8px;
}

.qty-box button{
background:#0f8a2b;
color:white;
}

.total-box{
text-align:center;
font-size:22px;
margin-top:20px;
}

.checkout-btn{
display:block;
margin:20px auto;
background:#0c831f;
color:white;
padding:12px 20px;
font-size:16px;
}

</style>

</head>

<body onload="loadCart()">

<nav>

<h1 class="logo">Blinkit Cart</h1>

<button onclick="window.location.href='index.html'">Home</button>

</nav>

<h2 class="cart-title">Your Selected Products</h2>

<div id="cartItems" class="cart-list"></div>

<div id="totalPrice" class="total-box"></div>

<button class="checkout-btn" onclick="goToCheckout()">Proceed to Checkout</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart = cart.map(item=>{
if(!item.qty){
item.qty=1;
}
return item;
});

function loadCart(){

let cartItems=document.getElementById("cartItems");

let total=0;

cartItems.innerHTML="";

cart.forEach((item,index)=>{

cartItems.innerHTML+=`

<div class="item">

<div class="qty-box">

<strong>${item.name}</strong>

<button onclick="updateQty(${index},-1)">-</button>

<span>${item.qty}</span>

<button onclick="updateQty(${index},1)">+</button>

</div>

<span>₹${item.price * item.qty}</span>

</div>

`;

total+=item.price*item.qty;

});

document.getElementById("totalPrice").innerHTML="Total Price: ₹"+total;

localStorage.setItem("cart",JSON.stringify(cart));

}

function updateQty(index,change){

cart[index].qty+=change;

if(cart[index].qty<=0){
cart.splice(index,1);
}

localStorage.setItem("cart",JSON.stringify(cart));

loadCart();

}

function goToCheckout(){
window.location.href="checkout.html";
}

</script>

</body>
</html>
