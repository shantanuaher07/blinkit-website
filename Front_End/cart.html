<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart - Blinkit Clone</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#0c831f;
    color:white;
    padding:15px;
    text-align:center;
}

.cart-container{
    width:60%;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:8px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ddd;
    padding:15px 0;
}

.product-name{
    font-size:18px;
}

.price{
    color:green;
}

.qty{
    width:40px;
}

.total{
    text-align:right;
    font-size:20px;
    margin-top:20px;
}

.checkout-btn{
    background:#0c831f;
    color:white;
    border:none;
    padding:12px 20px;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

.checkout-btn:hover{
    background:#096b19;
}
</style>

</head>

<body>

<header>
<h2>Your Cart 🛒</h2>
</header>

<div class="cart-container">

<div class="cart-item">
<div class="product-name">Milk</div>
<input class="qty" type="number" value="1">
<div class="price">₹50</div>
</div>

<div class="cart-item">
<div class="product-name">Bread</div>
<input class="qty" type="number" value="1">
<div class="price">₹40</div>
</div>

<div class="cart-item">
<div class="product-name">Eggs</div>
<input class="qty" type="number" value="1">
<div class="price">₹70</div>
</div>

<div class="total">
<strong>Total: ₹160</strong>
</div>

<br>

<div style="text-align:right;">
<button class="checkout-btn">Proceed to Checkout</button>
</div>

</div>

</body>

</html>
