<!DOCTYPE html>
<html>
<head>
<title>Blinkit Signup</title>

<style>

body{
font-family: Arial;
background:#f8f8f8;
}

.container{
width:350px;
margin:100px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#00b300;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#00b300;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Sign Up</h2>

<form id="signupForm">

<input type="text" id="email" placeholder="Enter Email" required>

<input type="password" id="password" placeholder="Create Password" required>

<button type="submit">Sign Up</button>

<p>Already have account? <a href="login.html">Login</a></p>

</form>

</div>

<script>

document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault();

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

fetch("http://localhost:3000/signup",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
})

.then(res=>res.json())
.then(data=>{

if(data.success){
alert("Signup Successful");
window.location.href="login.html";
}

})

})

</script>

<script>

document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault();

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

fetch("http://localhost:3000/signup",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
})

.then(res=>res.json())
.then(data=>{

if(data.success){
alert("Signup Successful");
window.location.href="index.html";   // redirect to homepage
}
else{
alert("Signup failed");
}

})

})

</script>

</body>
</html>
